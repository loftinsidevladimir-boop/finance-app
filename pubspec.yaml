name: finance_app
description: Personal Finance Tracker - учёт доходов и расходов
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.0

  # Local DB (offline support)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Network
  connectivity_plus: ^6.0.3

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.3
  uuid: ^4.4.0
  equatable: ^2.0.5

  # Security
  flutter_secure_storage: ^9.2.2

  # UI
  skeletonizer: ^1.3.0
  gap: ^3.0.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/